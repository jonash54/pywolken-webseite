services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5200 --workers 2 --timeout 120 --max-requests 500 --max-requests-jitter 50 "app:create_app()"
    ports:
      - "5200:5200"
    environment:
      - UPLOAD_FOLDER=/data/uploads
      - OUTPUT_FOLDER=/data/output
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
    volumes:
      - geodata:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal
      - default

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    environment:
      - UPLOAD_FOLDER=/data/uploads
      - OUTPUT_FOLDER=/data/output
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - geodata:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "1"
          memory: 2G
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redisdata:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  cleanup:
    build: .
    command: sh -c "while true; do python -c \"from app.cleanup import cleanup_expired; cleanup_expired()\"; sleep 300; done"
    environment:
      - UPLOAD_FOLDER=/data/uploads
      - OUTPUT_FOLDER=/data/output
      - FILE_EXPIRY_SECONDS=3600
    volumes:
      - geodata:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

volumes:
  geodata:
  redisdata:

networks:
  internal:
    driver: bridge
    internal: true
  default:
    driver: bridge
